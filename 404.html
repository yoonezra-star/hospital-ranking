<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없습니다 - 병원찾기</title>
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="요청한 페이지를 찾을 수 없습니다. 병원찾기 메인 검색과 건강 가이드로 이동할 수 있습니다.">
  <link rel="stylesheet" href="css/style.css?v=12">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 20%, rgba(199,139,70,0.12), transparent 28%),
        var(--bg-hero);
    }
    .not-found-card {
      width: min(760px, 100%);
      padding: 42px;
      border: 1px solid var(--border-default);
      border-radius: 28px;
      background: rgba(255,253,248,0.88);
      box-shadow: var(--shadow-xl);
      text-align: center;
    }
    .not-found-kicker {
      display: inline-flex;
      margin-bottom: 16px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(104,134,127,0.14);
      color: var(--primary-dark);
      font-weight: 700;
      font-size: 0.84rem;
    }
    .not-found-card h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      letter-spacing: -0.04em;
    }
    .not-found-card p {
      margin: 0 auto 24px;
      max-width: 560px;
      color: var(--text-body);
      line-height: 1.8;
    }
    .not-found-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    .not-found-actions a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid var(--border-default);
      background: var(--bg-card);
      color: var(--text-heading);
      font-weight: 700;
      text-decoration: none;
    }
    .not-found-actions a:first-child {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--text-inverse);
    }
    @media (max-width: 640px) {
      .not-found-card {
        padding: 32px 22px;
      }
      .not-found-actions a {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="not-found-card">
    <span class="not-found-kicker">404 Not Found</span>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>
      주소가 변경되었거나 삭제된 페이지입니다. 병원명, 지역명, 진료과를 다시 검색하거나 주요 안내 페이지로 이동해 주세요.
    </p>
    <nav class="not-found-actions" aria-label="주요 페이지">
      <a href="/">메인 검색으로 이동</a>
      <a href="/guide">건강 가이드 보기</a>
      <a href="/contact">정보 수정 문의</a>
      <a href="/sitemap.xml">사이트맵 확인</a>
    </nav>
  </main>
</body>
</html>
