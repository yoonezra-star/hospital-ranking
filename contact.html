<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문의하기 - 병원랭킹</title>
  <meta name="description" content="병원랭킹 서비스 이용 관련 문의, 제휴 제안, 데이터 수정 요청.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header" id="header" style="position:static; border-bottom:1px solid var(--border-default);">
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-icon">🏥</span>
        <span class="gradient-text">병원랭킹</span>
      </a>
      <nav class="nav-links">
        <a href="/">홈으로 돌아가기</a>
      </nav>
    </div>
  </header>

  <main class="container section-padding" style="max-width: 800px; padding-top: 60px;">
    <h1 style="font-size: var(--fs-4xl); margin-bottom: var(--sp-6);">문의하기 (Contact Us)</h1>
    
    <div style="line-height: var(--lh-relaxed); color: var(--text-body);">
      <p>병원랭킹을 이용해 주셔서 감사합니다. 서비스 이용 중 불편하신 점, 데이터 수정 요청(원장님/병원 관계자), 제휴 및 광고 관련 문의가 있으시다면 아래 이메일로 연락해 주시기 바랍니다.</p>
      
      <div style="margin-top: var(--sp-6); padding: var(--sp-6); background: var(--bg-card); border: 1px solid var(--border-default); border-radius: var(--r-lg);">
        <h3 style="margin-bottom: var(--sp-2);">이메일 문의</h3>
        <p style="font-size: var(--fs-xl); font-weight: bold; color: var(--primary);">contact@hospital-ranking.kr</p>
        <p style="margin-top: var(--sp-3); font-size: var(--fs-sm); color: var(--text-muted);">* 확인 후 영업일 기준 2~3일 내에 답변해 드립니다.</p>
      </div>
    </div>
  </main>

  <footer class="footer" style="margin-top: 0;">
    <div class="footer-inner" style="text-align: center; padding-top: 40px; padding-bottom: 40px;">
      <p>© 2026 병원랭킹. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
